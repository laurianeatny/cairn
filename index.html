<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAIRN — Atlas des souvenirs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Neue+Haas+Grotesk+Display+Pro:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        :root {
            --cream: #F6F3EC;
            --charcoal: #2B2A28;
            --red-topo: #B14B3F;
            --green-moss: #556B57;
            --stone: #9B9388;
            --blue-mist: #6D7C83;
            --clay: #A06A4B;
            --r: 14px;
            --r2: 24px;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            height: 100%;
            font-family: 'Neue Haas Grotesk Display Pro', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            overflow-x: hidden;
        }
        
        /* Grain léger pour le fond */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3d3dtbW17e3t1dXVAAAAacXJUPEdrS0t7e3t1dXVAAAAacXJUPEdrS0t7e3t1dXVAAAAacXJUPEdrS0t7e3t1dXVAAAAacXJUPEdrS0t7e3t1dXVAAAAacXJUPEdrS0t7e3t1dXVAAAAacXJUPEdrS0t7e3t1dXVAAAAgA0lEQVQY02W0z27DMAxE32P6DdqoJ2AgooJdQJ0FxpL7oJ2AgooJdQJ0FxpL7oJ2AgooJdQJ0FxpL7oJ2AgooJdQJ0FxpL7oJ2AgooJdQJ0FxpL7oJ2AgooJdQJ0FxpL7oJ2AgooJdQJ0FxpL7+5y8vJyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyM7D3z7A28F5f8AAAAASUVORK5CYII=');
            opacity: 0.05;
            pointer-events: none;
            z-index: -1;
        }
        
        /* Lignes topographiques en arrière-plan */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0,50 Q25,25 50,50 T100,50" stroke="%239B9388" stroke-width="0.5" fill="none" opacity="0.1"/></svg>');
            pointer-events: none;
            z-index: -1;
        }
        
        /* Landing Page */
        #landing {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 1000;
            transition: opacity 1.5s ease, transform 1.5s ease;
        }
        
        #landing.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #landing h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 400;
            color: var(--charcoal);
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            transition: opacity 1s ease;
        }
        
        #landing p {
            font-family: 'Neue Haas Grotesk Display Pro', sans-serif;
            font-size: 1.2rem;
            color: var(--stone);
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }
        
        #open-atlas {
            font-family: 'Neue Haas Grotesk Display Pro', sans-serif;
            font-size: 1rem;
            color: var(--blue-mist);
            text-decoration: none;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: color 0.5s ease;
        }
        
        #open-atlas:hover {
            color: var(--charcoal);
        }
        
        /* Page des GR */
        #gr-list {
            display: none;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        #gr-list.visible {
            display: block;
        }
        
        .gr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .gr-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: var(--r2);
            padding: 1.5rem;
            cursor: pointer;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            border: 1px solid rgba(155, 147, 136, 0.2);
        }
        
        .gr-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }
        
        .gr-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: var(--charcoal);
            margin-bottom: 0.5rem;
        }
        
        .gr-card p {
            font-family: 'Neue Haas Grotesk Display Pro', sans-serif;
            font-size: 0.9rem;
            color: var(--stone);
        }
        
        /* Page d'un GR */
        #gr-detail {
            display: none;
            position: relative;
            height: 100vh;
        }
        
        #gr-detail.visible {
            display: block;
        }
        
        #gr-map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #gr-sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            z-index: 2;
            transform: translateX(-100%);
            transition: transform 1s ease;
        }
        
        #gr-sidebar.visible {
            transform: translateX(0);
        }
        
        #gr-sidebar h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            color: var(--charcoal);
            margin-bottom: 1rem;
        }
        
        #gr-sidebar .gr-info {
            font-family: 'Neue Haas Grotesk Display Pro', sans-serif;
            font-size: 0.9rem;
            color: var(--stone);
            margin-bottom: 0.5rem;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 2s ease;
        }
    </style>
</head>
<body>
    <!-- Landing Page -->
    <div id="landing">
        <h1>CAIRN</h1>
        <p>Atlas des souvenirs</p>
        <a id="open-atlas">Ouvrir l’atlas</a>
    </div>
    
    <!-- Page des GR -->
    <div id="gr-list">
        <div class="gr-grid">
            <div class="gr-card">
                <h3>GR34</h3>
                <p>Sentier des douaniers, Bretagne</p>
            </div>
            <div class="gr-card">
                <h3>GR10</h3>
                <p>Traversée des Pyrénées</p>
            </div>
            <div class="gr-card">
                <h3>GR20</h3>
                <p>Traversée de la Corse</p>
            </div>
        </div>
    </div>
    
    <!-- Page d'un GR -->
    <div id="gr-detail">
        <div id="gr-map"></div>
        <div id="gr-sidebar">
            <h2>GR34</h2>
            <div class="gr-info">Date : 15 mai 2026</div>
            <div class="gr-info">Météo : Ensoleillé</div>
            <div class="gr-info">Notes : Une journée magnifique le long des falaises.</div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        // Gestion des pages
        document.getElementById('open-atlas').addEventListener('click', function() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('gr-list').classList.add('visible');
        });
        
        // Exemple : cliquer sur une carte de GR pour voir les détails
        document.querySelectorAll('.gr-card').forEach(card => {
            card.addEventListener('click', function() {
                document.getElementById('gr-list').classList.remove('visible');
                document.getElementById('gr-detail').classList.add('visible');
                document.getElementById('gr-sidebar').classList.add('visible');
                
                // Initialiser la carte Leaflet ici
                const map = L.map('gr-map').setView([48.8566, 2.3522], 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                
                // Ajouter un tracé de sentier (exemple)
                const path = L.polyline([[48.8566, 2.3522], [48.86, 2.36], [48.87, 2.37]], {
                    color: '#556B57',
                    weight: 4,
                    opacity: 0.8
                }).addTo(map);
            });
        });
        
        // Retour à la liste des GR
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('gr-detail').classList.remove('visible');
                document.getElementById('gr-sidebar').classList.remove('visible');
                document.getElementById('gr-list').classList.add('visible');
            }
        });
    </script>
</body>
</html>
